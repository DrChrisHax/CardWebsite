<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — CardTable</title>
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
  <main class="auth-page">
    <div class="auth-card">
      <h1>Create Account</h1>
      <p class="auth-subtitle">Join CardTable and start playing</p>
      <form id="register-form" action="#" method="post" novalidate>
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Choose a username" autocomplete="username" required>
          <span id="username-hint" class="field-hint" aria-live="polite"></span>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="your@email.com" autocomplete="email" required>
          <span id="email-hint" class="field-hint" aria-live="polite"></span>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Min. 8 characters" autocomplete="new-password" required>
        </div>
        <div class="form-group">
          <label for="confirm-password">Confirm Password</label>
          <input type="password" id="confirm-password" name="confirm-password" placeholder="Repeat your password" autocomplete="new-password" required>
          <span id="confirm-hint" class="field-hint" aria-live="polite"></span>
        </div>
        <p id="form-error" class="form-error" role="alert"></p>
        <button type="submit" id="submit-btn" class="btn-primary">Register</button>
      </form>
      <div class="auth-links">
        <span><a href="/login">Back to login</a></span>
      </div>
    </div>
  </main>
  <script src="/js/register.js"></script>
</body>
</html>
