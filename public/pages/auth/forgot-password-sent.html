<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Link Sent — CardTable</title>
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
  <main class="auth-page">
    <div class="auth-card">
      <h1>Check Your Email</h1>
      <p class="auth-subtitle">A reset link is on its way</p>
      <p style="color: var(--text-muted); text-align: center; font-size: 0.95rem; margin-bottom: 1.5rem;">
        If an account exists for that email address, a password reset link has been sent.
        Please check your inbox and follow the link to reset your password.
      </p>
      <div class="auth-links">
        <span><a href="/login">Back to login</a></span>
      </div>
    </div>
  </main>
</body>
</html>
