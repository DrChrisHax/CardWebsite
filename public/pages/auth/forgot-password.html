<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — CardTable</title>
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
  <main class="auth-page">
    <div class="auth-card">
      <h1>Forgot Password</h1>
      <p class="auth-subtitle">Enter your email and we will send you a reset link</p>
      <form action="/forgot-password-sent" method="get">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="your@email.com" required>
        </div>
        <button type="submit" class="btn-primary">Send me a password reset link</button>
      </form>
      <div class="auth-links">
        <span><a href="/login">Back to login</a></span>
      </div>
    </div>
  </main>
</body>
</html>
